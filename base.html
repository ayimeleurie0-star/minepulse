<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MindPulse{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c28;
            --accent: #7c6af7;
            --accent2: #f76a8a;
            --accent3: #6af7c8;
            --text: #e8e8f0;
            --muted: #7a7a9a;
            --border: rgba(124, 106, 247, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(124, 106, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(247, 106, 138, 0.06) 0%, transparent 50%);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2.5rem;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--text); }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.8rem;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.25s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #9c6af7);
            color: white;
            box-shadow: 0 4px 20px rgba(124, 106, 247, 0.35);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124, 106, 247, 0.5);
        }

        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .btn-outline:hover {
            background: rgba(124, 106, 247, 0.1);
        }

        main { padding: 2rem; max-width: 1100px; margin: 0 auto; }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">MindPulse</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/survey">Survey</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
        </ul>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
